<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Super Tetris — Le jeu emblématique</title>
<meta name="description" content="Super Tetris — Le jeu de puzzle légendaire avec boosters, roue de la fortune, classement mondial et niveaux trépidants !">
<meta name="theme-color" content="#0b1238">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.svg">
<link rel="apple-touch-icon" href="icons/icon-192.svg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@700;800;900&family=Bungee&display=swap" rel="stylesheet">

<link rel="stylesheet" href="src/styles/variables.css">
<link rel="stylesheet" href="src/styles/global.css">

<style>
  html, body { height:100%; margin:0; background:#0b1238; }
  #root { height:100%; display:flex; }
  body { font-family:'Nunito', system-ui, sans-serif; color:#fff; -webkit-font-smoothing:antialiased; overscroll-behavior:none; }

  /* Loader initial pré-React (avant que bundle.js charge) */
  #st-boot {
    position:fixed; inset:0; z-index:99999;
    background: radial-gradient(ellipse at center, #1a2a6e 0%, #0b1238 70%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    transition: opacity 0.4s ease;
  }
  #st-boot.hide { opacity:0; pointer-events:none; }
  #st-boot .logo {
    font-family:'Lilita One', cursive;
    font-size:46px;
    background: linear-gradient(90deg, #ef4444, #f97316, #eab308, #22c55e, #06b6d4, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing:3px;
    margin-bottom:24px;
    text-align:center;
    line-height:1;
    text-shadow: 0 4px 24px rgba(124,58,237,0.5);
  }
  #st-boot .logo .small { display:block; font-size:20px; color:#fff; -webkit-text-fill-color:#fff; letter-spacing:8px; margin-bottom:4px; }
  #st-boot .spinner {
    width:48px; height:48px; border-radius:50%;
    border:4px solid rgba(124,58,237,0.2);
    border-top-color:#a855f7;
    animation: st-spin 0.9s linear infinite;
  }
  @keyframes st-spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="st-boot">
  <div class="logo"><span class="small">SUPER</span>TETRIS</div>
  <div class="spinner"></div>
</div>

<div id="root"></div>

<!-- React 18 via CDN (cohérent avec la stack Byer) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<!-- Bundle pré-transpilé via Babel (build via build.js) -->
<script src="bundle.js?v=1"></script>

<script>
  window.addEventListener('super-tetris-ready', function() {
    var b = document.getElementById('st-boot');
    if (b) { b.classList.add('hide'); setTimeout(function(){ b.remove(); }, 400); }
  }, { once:true });
  setTimeout(function() {
    var b = document.getElementById('st-boot');
    if (b && !b.classList.contains('hide')) {
      b.classList.add('hide'); setTimeout(function(){ b.remove(); }, 400);
    }
  }, 8000);

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(function(){});
  }
</script>

</body>
</html>
